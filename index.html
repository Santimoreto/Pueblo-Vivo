<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Pueblo Vivo · Lotes Umepay</title>
<meta name="theme-color" content="#1f3d2b"/>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#1f3d2b; --forest-2:#2d5a3d; --leaf:#3fa66a; --leaf-soft:#dff0e4;
  --terra:#b5532a; --terra-soft:#f2dccf; --gold:#c98a2b;
  --sand:#f4efe6; --cream:#fbf8f1; --ink:#1c1a15; --muted:#867d6c; --line:#e6ded0;
  --libre:#3fa66a; --reservado:#e0a32e; --vendido:#9a9183;
  --disp:#3fa66a; --ocup:#c94f3d;
  --shadow:0 8px 30px rgba(31,61,43,.16); --shadow-sm:0 2px 10px rgba(31,61,43,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Spline Sans',system-ui,sans-serif;color:var(--ink);background:var(--sand);overflow:hidden;
  display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}

/* ---------- Topbar ---------- */
.topbar{position:relative;z-index:1200;background:var(--forest);color:#eef5ee;
  padding:11px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 2px 14px rgba(0,0,0,.22)}
.brand{display:flex;flex-direction:column;line-height:1.05;flex:1;min-width:0}
.brand .b1{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.3px}
.brand .b2{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#9ec9ad;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .logo{width:36px;height:36px;border-radius:11px;background:radial-gradient(circle at 35% 30%, var(--leaf), var(--forest-2));
  display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:900;color:#eaf6ec;font-size:19px;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.18);flex:0 0 auto}
.topbar .tb-btn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);
  color:#cfe6d4;display:grid;place-items:center;flex:0 0 auto}
.topbar .tb-btn svg{width:19px;height:19px}
.topbar .tb-btn.on{background:var(--gold);color:#2a1c06;border-color:var(--gold)}
.fav-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);color:#ffd9c9;padding:8px 10px;border-radius:999px;font-weight:600;font-size:13px}
.fav-pill svg{width:15px;height:15px}

/* ---------- Mode toggle ---------- */
.modebar{position:relative;z-index:1150;background:var(--cream);padding:9px 14px 0;display:flex;justify-content:center}
.seg{display:flex;background:#ece5d8;border-radius:999px;padding:4px;gap:3px;width:100%;max-width:420px;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06)}
.seg button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:14px;
  padding:9px 6px;border-radius:999px;display:flex;align-items:center;justify-content:center;gap:7px;transition:.18s}
.seg button svg{width:17px;height:17px}
.seg button.active{background:#fff;color:var(--forest);box-shadow:var(--shadow-sm)}
.seg button.active.alq{color:var(--terra)}

/* ---------- Filtros ---------- */
.filters{position:relative;z-index:1100;background:var(--cream);border-bottom:1px solid var(--line);
  display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;align-items:center}
.filters::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1.4px solid var(--line);background:#fff;color:var(--ink);
  padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.16s;white-space:nowrap}
.chip .cnt{font-size:11px;color:var(--muted);font-weight:600}
.chip .sw{width:11px;height:11px;border-radius:50%;display:inline-block}
.chip.active{background:var(--forest);color:#fff;border-color:var(--forest)}
.chip.active .cnt{color:#bfe0c8}
.chip svg{width:14px;height:14px}
.chip.fbtn{border-color:var(--terra);color:var(--terra)}
.chip.fbtn.dirty{background:var(--terra);color:#fff}

/* ---------- Map ---------- */
#map{flex:1;background:#aeb9a8;z-index:1}
.leaflet-container{background:#9fb29c;font-family:inherit}
.parc-label{background:transparent;border:0;box-shadow:none;color:#fff;font-weight:700;font-size:12px;
  text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 4px rgba(0,0,0,.6);padding:0;white-space:nowrap}
.parc-label::before{display:none}
.parc-label.lib{color:#d6ffe5}
.lbl-barrio{display:flex;justify-content:center;align-items:center;background:transparent;border:0;box-shadow:none}
.lbl-barrio span{background:rgba(122,67,38,.92);color:#fff;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:6px;box-shadow:0 1px 5px rgba(0,0,0,.45);white-space:nowrap}
.poi-icon{background:transparent;border:0}
.poi-pin{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 3px rgba(0,0,0,.45))}
.poi-pin .b{width:26px;height:26px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);display:grid;place-items:center;
  background:#fff;border:2px solid var(--forest)}
.poi-pin .b svg{transform:rotate(-45deg);width:15px;height:15px;color:var(--forest)}
.poi-pin .t{margin-top:3px;background:rgba(31,61,43,.92);color:#fff;font-size:10.5px;font-weight:700;
  padding:2px 6px;border-radius:5px;white-space:nowrap}
.poi-pin.servicio .b{border-color:var(--terra)} .poi-pin.servicio .b svg{color:var(--terra)}
.poi-pin.naturaleza .b{border-color:#2b7bba} .poi-pin.naturaleza .b svg{color:#2b7bba}

/* map floating controls */
.fab-col{position:absolute;right:14px;z-index:1000;display:flex;flex-direction:column;gap:10px}
.fab{width:46px;height:46px;border-radius:14px;background:#fff;border:0;box-shadow:var(--shadow);
  display:grid;place-items:center;color:var(--forest)}
.fab svg{width:23px;height:23px}
.fab.on{background:var(--leaf);color:#fff}
.fab.loc.tracking{background:var(--leaf);color:#fff}
.fab .badge{position:absolute;top:-5px;right:-5px;background:var(--terra);color:#fff;font-size:10px;font-weight:800;
  min-width:17px;height:17px;border-radius:99px;display:grid;place-items:center;padding:0 3px}
.legend{position:absolute;left:14px;bottom:16px;z-index:900;background:rgba(251,248,241,.95);
  backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:14px;padding:9px 11px;box-shadow:var(--shadow-sm);font-size:12px;max-width:165px}
.legend h4{font-family:'Fraunces',serif;font-size:12px;font-weight:600;color:var(--forest);margin-bottom:5px}
.legend .row{display:flex;align-items:center;gap:7px;margin:4px 0;color:#4a4639;font-weight:500}
.legend .sw{width:13px;height:13px;border-radius:4px;border:1.5px solid rgba(0,0,0,.18)}
.me-dot{width:16px;height:16px;border-radius:50%;background:#2f7be6;border:3px solid #fff;box-shadow:0 0 0 2px rgba(47,123,230,.4),0 1px 4px rgba(0,0,0,.4)}

/* compare tray */
.tray{position:absolute;left:50%;transform:translateX(-50%) translateY(120%);bottom:16px;z-index:950;
  background:var(--forest);color:#fff;border-radius:16px;box-shadow:var(--shadow);display:flex;align-items:center;
  gap:12px;padding:10px 12px 10px 16px;transition:transform .28s;max-width:92vw}
.tray.show{transform:translateX(-50%) translateY(0)}
.tray .info{font-size:13px;font-weight:600;line-height:1.2}
.tray .info small{display:block;color:#bfe0c8;font-weight:500;font-size:11px}
.tray button{background:#fff;color:var(--forest);border:0;border-radius:11px;padding:9px 14px;font-weight:700;font-size:13px}
.tray .x{background:transparent;color:#bfe0c8;padding:6px}

/* admin banner */
.adminbar{display:none;background:var(--gold);color:#2a1c06;font-size:12.5px;font-weight:700;
  padding:7px 14px;align-items:center;gap:8px;z-index:1140;position:relative}
.adminbar.show{display:flex}
.adminbar svg{width:15px;height:15px}

/* ---------- Sheets ---------- */
.scrim{position:fixed;inset:0;background:rgba(28,26,21,.42);z-index:1400;opacity:0;pointer-events:none;transition:opacity .28s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:1500;background:var(--cream);
  border-radius:26px 26px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.30);
  transform:translateY(105%);transition:transform .34s cubic-bezier(.22,1,.36,1);max-height:92vh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.grip{width:42px;height:5px;border-radius:99px;background:#d9cfbd;margin:10px auto 4px;flex:0 0 auto}
.sheet-scroll{overflow-y:auto;padding:4px 18px 30px;overscroll-behavior:contain}

.sh-head{display:flex;align-items:flex-start;gap:12px;padding-top:6px}
.sh-title{flex:1}
.sh-title .barrio{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--terra);font-weight:700}
.sh-title h2{font-family:'Fraunces',serif;font-weight:600;font-size:25px;line-height:1.08;margin-top:2px}
.statusbadge{font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:999px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.statusbadge .sw{width:8px;height:8px;border-radius:50%;background:currentColor}
.st-libre,.st-disp{background:var(--leaf-soft);color:#1d7a45}
.st-reservado{background:#fbeecb;color:#9a6a0e}
.st-vendido{background:#ece8e0;color:#6f685b}
.st-ocup{background:#f6dcd6;color:#a23a2a}

.priceblock{display:flex;align-items:baseline;gap:10px;margin:16px 0 4px;flex-wrap:wrap}
.price{font-family:'Fraunces',serif;font-weight:700;font-size:31px;color:var(--forest);letter-spacing:.5px}
.price .cur{font-size:15px;color:var(--muted);font-weight:600;margin-right:2px}
.price .per{font-size:15px;color:var(--muted);font-weight:600}
.permeter{font-size:12.5px;color:var(--muted);font-weight:500}
.sold .price{color:var(--muted);text-decoration:line-through;text-decoration-thickness:2px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 4px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 12px}
.stat .lab{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat .val{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-top:3px;color:var(--ink)}
.stat .val small{font-size:11px;color:var(--muted);font-weight:600}

.sec-t{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--forest);margin:20px 0 9px;display:flex;align-items:center;gap:7px}
.sec-t svg{width:16px;height:16px;color:var(--terra)}

/* nearby */
.nearby{display:flex;flex-direction:column;gap:7px}
.nb{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 12px}
.nb .ico{width:30px;height:30px;border-radius:9px;background:var(--leaf-soft);display:grid;place-items:center;color:var(--forest);flex:0 0 auto}
.nb .ico svg{width:17px;height:17px}
.nb .nm{flex:1;font-weight:600;font-size:13.5px}.nb .nm small{display:block;color:var(--muted);font-weight:500;font-size:11.5px}
.nb .d{font-family:'Fraunces',serif;font-weight:600;color:var(--terra);font-size:14px}

/* sun */
.sun{display:flex;align-items:center;gap:12px;background:linear-gradient(100deg,#fff6e6,#fff);border:1px solid #f0e2c2;border-radius:14px;padding:12px 14px}
.sun .orb{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffd564,#f0a92b);flex:0 0 auto;box-shadow:0 0 0 6px #ffe9b733}
.sun .txt b{font-family:'Fraunces',serif;font-size:15px;color:#9a6a0e}
.sun .txt p{font-size:12.5px;color:#7a6a45;margin-top:1px}
.stars{color:#e0a32e;font-size:13px;letter-spacing:1px;margin-top:3px}

/* gallery */
.gallery{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin:0 -18px;padding-left:18px;padding-right:18px}
.gallery::-webkit-scrollbar{display:none}
.gphoto{flex:0 0 auto;width:150px;height:108px;border-radius:14px;object-fit:cover;background:#e5ddcd;box-shadow:var(--shadow-sm)}
.gphoto.user{box-shadow:0 0 0 2.5px var(--leaf), var(--shadow-sm)}
.addphoto{flex:0 0 auto;width:104px;height:108px;border-radius:14px;border:2px dashed #cdbfa6;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--terra);font-size:11.5px;font-weight:600}
.addphoto svg{width:24px;height:24px}
.usertag{font-size:10px;color:var(--leaf);font-weight:700;margin-top:-2px}

/* features / amenities */
.feats{display:flex;flex-wrap:wrap;gap:7px}
.feat{background:var(--leaf-soft);color:#1d6e40;border-radius:999px;padding:6px 11px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:5px}
.feat svg{width:13px;height:13px}
.feat.amen{background:#eef3ff;color:#2d5198}

/* calendar */
.cal-wrap{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.cal{flex:0 0 auto;width:220px}
.cal h5{font-family:'Fraunces',serif;font-size:13.5px;color:var(--forest);text-transform:capitalize;margin-bottom:6px;text-align:center}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal .dow{font-size:9.5px;color:var(--muted);text-align:center;font-weight:700}
.cal .day{aspect-ratio:1;display:grid;place-items:center;font-size:11.5px;border-radius:7px;color:#5a5346;font-weight:600}
.cal .day.out{color:transparent}
.cal .day.free{background:var(--leaf-soft);color:#1d7a45}
.cal .day.busy{background:#f1ddd7;color:#b65b48;text-decoration:line-through}
.cal .day.today{outline:2px solid var(--terra);outline-offset:-2px}
.calleg{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin:8px 0 2px}
.calleg span{display:flex;align-items:center;gap:5px}
.calleg i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* actions */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 4px}
.act{border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:12px;font-weight:600;font-size:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ink);transition:.16s}
.act svg{width:19px;height:19px}
.act.on.like{background:#fff0eb;border-color:var(--terra);color:var(--terra)}
.act.on.seen{background:var(--leaf-soft);border-color:var(--leaf);color:#1d7a45}
.act.full{grid-column:1/-1}
.btn-primary{grid-column:1/-1;background:var(--forest);color:#fff;border:0;border-radius:14px;padding:14px;font-weight:700;font-size:15px;
  display:flex;align-items:center;justify-content:center;gap:9px}
.btn-primary.wa{background:#1ea861}
.btn-primary svg{width:20px;height:20px}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.share-row .act{font-size:13px}

/* admin edit box */
.adminbox{background:#fff7e6;border:1.5px solid #f0d695;border-radius:14px;padding:13px;margin-top:18px}
.adminbox h4{font-family:'Fraunces',serif;color:#9a6a0e;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.adminbox h4 svg{width:15px;height:15px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:700;color:#7a6a45;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.field select,.field input{width:100%;border:1.5px solid #e6d6ac;border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff}
.field.inline{display:flex;align-items:center;justify-content:space-between}
.switch{width:46px;height:26px;border-radius:99px;background:#d9cdb0;position:relative;transition:.18s;border:0;flex:0 0 auto}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s}
.switch.on{background:var(--leaf)}.switch.on::after{left:23px}
.adminbox .save{width:100%;background:var(--gold);color:#2a1c06;border:0;border-radius:11px;padding:11px;font-weight:700;margin-top:4px}

/* comments */
.comments{display:flex;flex-direction:column;gap:9px}
.comment{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px}
.comment .meta{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;display:flex;justify-content:space-between}
.comment p{font-size:13.5px;line-height:1.4}
.cbox{display:flex;gap:8px;margin-top:11px}
.cbox input{flex:1;border:1.5px solid var(--line);border-radius:13px;padding:11px 13px;font-size:14px;font-family:inherit;background:#fff;outline:none}
.cbox input:focus{border-color:var(--leaf)}
.cbox button{background:var(--forest);color:#fff;border:0;border-radius:13px;padding:0 16px;font-weight:600}
.empty-c{font-size:13px;color:var(--muted);font-style:italic;padding:4px 0}
.disclaimer{font-size:11px;color:var(--muted);text-align:center;margin-top:22px;line-height:1.5}

/* filter sheet */
.fsheet-scroll{padding:6px 18px 26px;overflow-y:auto}
.frow{margin-bottom:20px}
.frow h4{font-family:'Fraunces',serif;font-size:15px;color:var(--forest);margin-bottom:10px}
.frange{display:flex;align-items:center;gap:10px}
.frange input[type=range]{flex:1;accent-color:var(--forest)}
.fval{font-family:'Fraunces',serif;font-weight:600;color:var(--terra);font-size:15px;min-width:96px;text-align:right}
.fchips{display:flex;flex-wrap:wrap;gap:8px}
.fchip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink)}
.fchip.on{background:var(--forest);color:#fff;border-color:var(--forest)}
.fbtns{display:flex;gap:10px;margin-top:6px}
.fbtns button{flex:1;border-radius:13px;padding:13px;font-weight:700;font-size:14px;border:1.5px solid var(--line);background:#fff;color:var(--ink)}
.fbtns button.apply{background:var(--forest);color:#fff;border-color:var(--forest)}

/* compare modal */
.cmp-scroll{padding:6px 14px 26px;overflow:auto}
.cmp-table{width:100%;border-collapse:separate;border-spacing:0}
.cmp-table th,.cmp-table td{padding:11px 9px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
.cmp-table th{background:var(--leaf-soft);font-family:'Fraunces',serif;color:var(--forest);font-weight:600;position:sticky;top:0}
.cmp-table .rl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.cmp-table tr:first-child td{font-weight:700}

/* inventario real */
.inv-h{display:flex;align-items:center;gap:10px;margin:4px 2px 6px}
.inv-h h2{font-family:'Fraunces',serif;color:var(--forest);font-size:21px;flex:1}
.inv-sync{background:#1ea861;color:#fff;border:0;border-radius:11px;padding:9px 12px;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:6px}
.inv-sync svg{width:15px;height:15px}
.inv-sub{font-size:12.5px;color:var(--muted);margin:0 2px 12px;line-height:1.45}
.inv-grp{font-family:'Fraunces',serif;font-size:12px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:1px;margin:16px 4px 7px}
.inv-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px;display:flex;gap:11px;align-items:center}
.inv-card .ic{flex:1;min-width:0}
.inv-card .nm{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:7px}
.inv-card .meta{font-size:12px;color:var(--muted);margin-top:2px}
.inv-card .pr{font-family:'Fraunces',serif;font-weight:600;color:var(--forest);font-size:15px;white-space:nowrap}
.nota-badge{font-size:9.5px;font-weight:800;letter-spacing:.4px;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.nb-OPORTUNIDAD,.nb-UNICA{background:#fdebd0;color:#b5532a}

.inv-link.placed{background:var(--leaf-soft);border-color:var(--leaf);color:#1d7a45}

.inv-mini{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--forest)}

.inv-mini.del{color:var(--ocup);border-color:#eccfc8}
.inv-lote{font-size:10.5px;font-weight:700;color:#1d7a45;background:var(--leaf-soft);padding:2px 7px;border-radius:6px;margin-left:4px;white-space:nowrap}
.inv-add{width:100%;border:1.5px dashed var(--terra);background:#fff;color:var(--terra);border-radius:13px;padding:12px;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.inv-add svg{width:18px;height:18px}
.linkbar{position:fixed;left:50%;transform:translateX(-50%) translateY(140%);bottom:18px;z-index:1650;background:var(--terra);color:#fff;
  border-radius:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;padding:11px 13px 11px 16px;transition:transform .28s;max-width:92vw;font-size:13.5px;font-weight:600}
.linkbar.show{transform:translateX(-50%) translateY(0)}
.linkbar button{background:rgba(255,255,255,.2);color:#fff;border:0;border-radius:9px;padding:7px 11px;font-weight:700;font-size:12.5px}
.sheet-fields{background:#eef5ef;border:1px solid #cfe6d4;border-radius:14px;padding:12px;margin-top:18px}
.sheet-fields h4{font-family:'Fraunces',serif;color:var(--forest);font-size:14px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.sheet-fields h4 svg{width:16px;height:16px;flex:0 0 auto;color:var(--terra)}
.sheet-fields .kv{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;border-bottom:1px dashed #d3e4d6}
.sheet-fields .kv:last-child{border:0}.sheet-fields .kv .k{color:var(--muted);font-weight:600}.sheet-fields .kv .v{font-weight:600;text-align:right}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:1700;
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:500;
  opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:820px){
  .sheet{left:auto;right:18px;bottom:18px;top:120px;width:430px;border-radius:24px;transform:translateX(135%)}
  .sheet.open{transform:translateX(0)}
  .sheet .grip{display:none}
}
</style>

<script>
/* ============ Datos sintéticos (prototipo) ============ */
const CENTRO=[-32.199,-64.743];
function rng(seed){let t=seed+0x6D2B79F5;return function(){t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
const FEATS=[["Vista a las sierras","mountain"],["Arbolado nativo","tree"],["Acceso a agua","drop"],["Pendiente suave","slope"],["Orientación norte","sun"],["Apto huerta","leaf"],["Sombra de algarrobos","tree"],["Esquina","corner"],["Frente amplio","ruler"],["Zona alta","peak"],["Privacidad","shield"]];
const AMEN=[["Energía solar","sun"],["Agua de vertiente","drop"],["Estufa a leña","fire"],["Huerta","leaf"],["Wifi","wifi"],["Cocina equipada","pot"],["Vista a las sierras","mountain"],["Baño compost","leaf"],["Pet friendly","paw"],["Galería techada","home"]];
const ORIENT=["Norte","Noreste","Este","Noroeste","Sureste"];
const SOL={Norte:["Sol todo el día","Cálido en invierno — ideal en la sierra",5],Noreste:["Sol de mañana y mediodía","Muy luminoso, fresco a la tarde",4],Noroeste:["Sol de mediodía y tarde","Atardeceres largos",4],Este:["Sol de mañana","Mañanas luminosas, sombra a la tarde",3],Sureste:["Sol parcial de mañana","Más fresco y sombreado",2]};
function precioBase(b){const t={"Aldea":22,"Nogales Alto":19,"Nogales Bajo":15,"3 Rios":17,"7 Lomas":14,"9 Lomas":13,"Espinillos":12,"Acacias":16,"Castaños":18,"Castanos":18,"CampoNina":11};return t[b]||13;}

function buildInfo(p){
  const r=rng(p.id*97+13), roll=r();
  let estado= roll<0.55?"libre": roll<0.80?"reservado":"vendido";
  const usd=Math.round(precioBase(p.barrio)*(0.85+r()*0.45));
  const total=Math.round(p.sup*usd/500)*500;
  const pool=[...FEATS],feats=[],nf=2+Math.floor(r()*3);
  for(let i=0;i<nf;i++)feats.push(pool.splice(Math.floor(r()*pool.length),1)[0]);
  const orient=ORIENT[Math.floor(r()*ORIENT.length)];
  const fotos=[],nfo=2+Math.floor(r()*2);
  for(let i=0;i<nfo;i++)fotos.push(`https://picsum.photos/seed/ume${p.id}x${i}/640/420`);
  // ¿es casa en alquiler?
  const isCasa = r()<0.16;
  let rental=null;
  if(isCasa){
    const nightly=20+Math.floor(r()*70);
    const cap=2+Math.floor(r()*7);
    const ap=[...AMEN],am=[],na=3+Math.floor(r()*4);
    for(let i=0;i<na;i++)am.push(ap.splice(Math.floor(r()*ap.length),1)[0]);
    // rangos ocupados en los próximos 75 días
    const busy=new Set();let d=2+Math.floor(r()*10);
    while(d<70){const len=1+Math.floor(r()*5);for(let k=0;k<len;k++)busy.add(d+k);d+=len+3+Math.floor(r()*12);}
    rental={nightly,cap,am,busy:[...busy]};
  }
  return {estado,usd,total,feats,orient,fotos,isCasa,rental};
}

/* ============ Estado de usuario / admin (localStorage) ============ */
const SKEY="pv_lotes_v1", AKEY="pv_admin_v1";
let STATE=JSON.parse(localStorage.getItem(SKEY)||"{}");
let ADMIN=JSON.parse(localStorage.getItem(AKEY)||"{}");
function uget(id){if(!STATE[id])STATE[id]={fav:false,seen:false,photos:[],comments:[]};return STATE[id];}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(STATE));}catch(e){toast("Almacenamiento lleno");}}
function saveAdmin(){try{localStorage.setItem(AKEY,JSON.stringify(ADMIN));}catch(e){}}
// info efectiva = sintética + override admin
function info(id){
  let o=Object.assign({},DATA[id]);
  const L=linkByNum[numById[id]];
  if(L){o.fromSheet=true;o.listingKey=L.key;o.inmueble=L.inmueble;o.legalidad=L.legalidad;o.tipo=L.tipo;o.nota=L.nota;o.otros=L.otros;o.mtCub=L.mtCub;o.valorRaw=L.valorRaw;o.sheetMapaN=L.mapaN;if(L.valor!=null)o.total=L.valor;o.estado=(L.nota&&/PAUSAD/i.test(L.nota))?'reservado':'libre';}
  return Object.assign(o,ADMIN[id]||{});
}

/* ============ Mapa ============ */
const map=L.map('map',{zoomControl:false}).setView(CENTRO,15);
L.control.zoom({position:'bottomright'}).addTo(map);
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Imagery © Esri'});
const calle=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
sat.addTo(map);let satOn=true;
document.getElementById('btnSat').onclick=()=>{satOn=!satOn;if(satOn){map.removeLayer(calle);sat.addTo(map);}else{map.removeLayer(sat);calle.addTo(map);}refreshLabels();};

const C_SALE={libre:'#3fa66a',reservado:'#e0a32e',vendido:'#9a9183'};
let DATA={},layers={},labels={},centers={};
let MODE='comprar', currentFilter='todos', adminMode=false, poiVisible=true;
const SHEET_ID='1Pw0L4looH6IhS5K4NrXLnwseDTBNpmzCt-dFLB-SLh0', SHEET_GID='1795702258', INVKEY='pv_inv_v1';
let invSeq=0, REALES=loadInv(), linkMode=null, linkByNum={};
const numById={}; PARCELAS.features.forEach(f=>numById[f.properties.id]=f.properties.num);
for(const k in ADMIN){if(ADMIN[k]&&ADMIN[k].sheetRef!=null)delete ADMIN[k];} saveAdmin(); // limpia enlaces viejos
let compare=[]; // ids
let FILT={maxPrice:null,minSize:0,orient:[]};

const haversine=(a,b)=>{const R=6371000,d2r=Math.PI/180;const dLat=(b[0]-a[0])*d2r,dLng=(b[1]-a[1])*d2r;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*d2r)*Math.cos(b[0]*d2r)*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(s));};
const fmtDist=m=>m<1000?Math.round(m/10)*10+' m':(m/1000).toFixed(1)+' km';

function estilo(id){
  const inf=info(id),u=uget(id);
  if(MODE==='alojar'){
    if(!inf.isCasa) return {opacity:0,fillOpacity:0};
    const avail=isAvailableNow(inf);
    const c=avail?'#3fa66a':'#c94f3d';
    return {color:c,weight:u.fav?3.4:2.2,fillColor:c,fillOpacity:.42,opacity:1};
  }
  const c=C_SALE[inf.estado];
  const sel=compare.includes(id);
  return {color:sel?'#b5532a':c,weight:(u.fav||sel)?3.4:1.8,fillColor:c,
    fillOpacity:inf.estado==='vendido'?0.18:0.40,dashArray:inf.estado==='reservado'?'5,4':null,opacity:1};
}
function isAvailableNow(inf){ if(!inf.rental)return false; return !inf.rental.busy.includes(0); }

PARCELAS.features.forEach(f=>{
  const id=f.properties.id;
  DATA[id]=buildInfo(f.properties);
  const layer=L.geoJSON(f,{style:()=>estilo(id)});
  if(!layer.getBounds().isValid()){delete DATA[id];return;}
  layer.addTo(map);
  layer.on('click',()=>onLoteClick(id));
  layers[id]=layer;
  const c=layer.getBounds().getCenter();centers[id]=[c.lat,c.lng];
  const m=L.marker(c,{icon:L.divIcon({className:'parc-label',html:'',iconSize:[40,18]})});
  m.on('click',()=>onLoteClick(id));m.addTo(map);labels[id]=m;
});
// distancias a POIs de referencia
const REF_POIS=(window.POIS||[]).filter(p=>p.ref);
for(const id in centers){DATA[id].dist=REF_POIS.map(p=>({name:p.name,desc:p.desc,icon:p.icon,m:haversine(centers[id],[p.lat,p.lng])}));}

/* etiquetas de barrio (como en umeapp) */
const barrioLayer=L.layerGroup().addTo(map);
(function(){const norm=s=>(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const g={};
  PARCELAS.features.forEach(f=>{const id=f.properties.id;if(!centers[id])return;const b=f.properties.barrio;if(!b||norm(b)==='sin barrio')return;
    const k=norm(b);if(!g[k])g[k]={name:b,pts:[]};g[k].pts.push(centers[id]);});
  for(const k in g){const pts=g[k].pts;const lat=pts.reduce((s,p)=>s+p[0],0)/pts.length,lng=pts.reduce((s,p)=>s+p[1],0)/pts.length;
    L.marker([lat,lng],{icon:L.divIcon({className:'lbl-barrio',html:'<span>'+g[k].name+'</span>',iconSize:[140,22],iconAnchor:[70,11]}),interactive:false,zIndexOffset:-200}).addTo(barrioLayer);}
})();

function onLoteClick(id){ if(linkMode!=null){linkListing(linkMode,id);return;} if(MODE==='comprar'&&compareMode){toggleCompare(id);return;} openSheet(id); }

/* ---- POI markers ---- */
const poiLayer=L.layerGroup().addTo(map);
function poiIconSvg(k){const I={cart:'<path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M6 6 5 3H2"/>',tea:'<path d="M4 8h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5z"/><path d="M17 9h2a2 2 0 0 1 0 5h-2"/><path d="M7 4c0 1-1 1-1 2M11 4c0 1-1 1-1 2"/>',school:'<path d="M3 9l9-5 9 5-9 5z"/><path d="M7 11v5c0 1 5 3 5 3s5-2 5-3v-5"/>',water:'<path d="M12 3c4 5 6 8 6 11a6 6 0 1 1-12 0c0-3 2-6 6-11z"/>',tree:'<path d="M12 2l5 7h-3l4 6h-4v5h-4v-5H6l4-6H7z"/>',sport:'<circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/>',star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.1 1.1 6L12 16.9 6.7 19.5l1.1-6L3.4 9.4l6-.8z"/>',pin:'<path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/>'};return I[k]||I.pin;}
(window.POIS||[]).forEach(p=>{
  const html=`<div class="poi-pin ${p.cat}"><div class="b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${poiIconSvg(p.icon)}</svg></div><div class="t">${p.name}</div></div>`;
  L.marker([p.lat,p.lng],{icon:L.divIcon({className:'poi-icon',html,iconSize:[60,46],iconAnchor:[30,40]})}).addTo(poiLayer);
});
document.getElementById('btnPoi').classList.add('on');
document.getElementById('btnPoi').onclick=function(){poiVisible=!poiVisible;this.classList.toggle('on',poiVisible);
  if(poiVisible)poiLayer.addTo(map);else map.removeLayer(poiLayer);};

/* ============ Labels ============ */
function labelHtml(id){
  const f=PARCELAS.features.find(x=>x.properties.id==id);if(!f)return'';
  const u=uget(id),inf=info(id);
  const heart=u.fav?'❤ ':'';const eye=(MODE==='comprar'&&u.seen)?'✓ ':'';
  if(MODE==='alojar') return heart+'$'+inf.rental.nightly;
  return heart+eye+(f.properties.num!=null?f.properties.num:'');
}
function refreshLabels(){
  const z=map.getZoom();
  for(const id in labels){
    const inf=info(id),u=uget(id),m=labels[id],el=m.getElement();
    if(!passesFilter(id)){if(el)el.style.display='none';continue;}
    if(el)el.style.display='';
    const html=labelHtml(id);
    m.setIcon(L.divIcon({className:'parc-label '+(inf.estado==='libre'?'lib':''),html,iconSize:[44,18]}));
  }
}
map.on('zoomend',refreshLabels);

/* ============ Filtros ============ */
function passesFilter(id){
  const inf=info(id),u=uget(id);
  if(MODE==='alojar'){ if(!inf.isCasa)return false;
    if(currentFilter==='disp')return isAvailableNow(inf);
    if(currentFilter==='ocup')return !isAvailableNow(inf);
    if(currentFilter==='fav')return u.fav;
    return true; }
  // comprar
  if(currentFilter==='libre'&&inf.estado!=='libre')return false;
  if(currentFilter==='reservado'&&inf.estado!=='reservado')return false;
  if(currentFilter==='vendido'&&inf.estado!=='vendido')return false;
  if(currentFilter==='fav'&&!u.fav)return false;
  if(currentFilter==='seen'&&!u.seen)return false;
  // filtros avanzados
  const f=PARCELAS.features.find(x=>x.properties.id==id);
  if(FILT.maxPrice&&inf.total>FILT.maxPrice)return false;
  if(FILT.minSize&&f.properties.sup<FILT.minSize)return false;
  if(FILT.orient.length&&!FILT.orient.includes(inf.orient))return false;
  return true;
}
function applyFilter(){
  for(const id in layers){
    const show=passesFilter(id),lyr=layers[id];
    if(show){if(!map.hasLayer(lyr))lyr.addTo(map);lyr.setStyle&&lyr.setStyle(estilo(id));}
    else if(map.hasLayer(lyr))map.removeLayer(lyr);
  }
  refreshLabels();
}
function counts(){
  let c={todos:0,libre:0,reservado:0,vendido:0,fav:0,seen:0,casas:0,disp:0,ocup:0,favA:0};
  for(const id in DATA){const inf=info(id),u=uget(id);
    if(inf.isCasa){c.casas++;if(isAvailableNow(inf))c.disp++;else c.ocup++;if(u.fav)c.favA++;}
    else{c.todos++;c[inf.estado]++;if(u.fav)c.fav++;if(u.seen)c.seen++;}
  }
  // en compra "todos" cuenta lotes no-casa
  c.todos=0;for(const id in DATA){if(!info(id).isCasa)c.todos++;}
  for(const id in DATA){const u=uget(id);if(!info(id).isCasa&&u.fav)c.fav++;}
  return c;
}

/* mini calendarios */
function calMonths(busyArr,n){
  const busy=new Set(busyArr);const today=new Date();today.setHours(0,0,0,0);
  const dow=['L','M','M','J','V','S','D'];let out='';
  for(let mo=0;mo<n;mo++){
    const d=new Date(today.getFullYear(),today.getMonth()+mo,1);
    const name=d.toLocaleDateString('es-AR',{month:'long',year:'numeric'});
    const first=(d.getDay()+6)%7;const days=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    let cells=dow.map(x=>`<div class="dow">${x}</div>`).join('');
    for(let i=0;i<first;i++)cells+=`<div class="day out">.</div>`;
    for(let day=1;day<=days;day++){
      const cur=new Date(d.getFullYear(),d.getMonth(),day);
      const diff=Math.round((cur-today)/86400000);
      const isBusy=busy.has(diff);const isToday=diff===0;const past=diff<0;
      let cls='day '+(past?'out':isBusy?'busy':'free')+(isToday?' today':'');
      cells+=`<div class="${cls}">${day}</div>`;
    }
    out+=`<div class="cal"><h5>${name}</h5><div class="grid">${cells}</div></div>`;
  }
  return out;
}

  try{const c=JSON.parse(localStorage.getItem(INVKEY)||'null');if(c&&c.v===baseV&&c.items&&c.items.length)arr=c.items;}catch(e){}

  arr.forEach(r=>{if(!r.key)r.key='l'+(++invSeq);else{const n=+String(r.key).replace(/\D/g,'');if(n>invSeq)invSeq=n;}if(r.loteNum===undefined)r.loteNum=null;});
  return arr;
}

function parseCSV(t){const rows=[];let cell='',row=[],q=false;for(let i=0;i<t.length;i++){const c=t[i];
  if(q){if(c==='"'){if(t[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=c;}
  else{if(c==='"')q=true;else if(c===',') {row.push(cell);cell='';} else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';} else if(c!=='\r')cell+=c;}}
  if(cell.length||row.length){row.push(cell);rows.push(row);}return rows;}
function vnum(x){if(x==null)return null;const s=String(x).replace(/\s/g,'');return /^\d+$/.test(s)?+s:null;}
function parseSheet(text){
  const rows=parseCSV(text);let h=-1,cm=-1;
  for(let i=0;i<rows.length;i++){const j=rows[i].findIndex(c=>/mapa/i.test(c||''));if(j>=0){h=i;cm=j;break;}}
  if(h<0)throw new Error('no header');
  const ci=cm-2,ct=cm-1,cl=cm+1,cmt=cm+2,ccub=cm+3,csemi=cm+4,cotr=cm+5,cv=cm+6,cn=cm+7;
  let barrio=(rows[h][ci]||'').trim()||'—';
  const out=[];
  for(let i=h+1;i<rows.length;i++){const r=rows[i];const g=k=>(r[k]||'').trim();
    const inmueble=g(ci),tipo=g(ct),mapaN=g(cm),legal=g(cl),mtT=g(cmt),mtC=g(ccub),semi=g(csemi),otros=g(cotr),valor=g(cv),nota=g(cn);
    if(inmueble.toLowerCase()==='inmueble')continue;
    const rest=[tipo,mapaN,legal,mtT,valor].some(Boolean);
    if(inmueble&&!rest){barrio=inmueble;continue;}
    if(!inmueble&&!valor&&!tipo)continue;
    out.push({barrio,inmueble,tipo:tipo||null,mapaN:vnum(mapaN),legalidad:legal||null,mtTerreno:mtT||null,mtCub:mtC||null,semicub:semi||null,otros:otros||null,valor:vnum(valor),valorRaw:valor||null,nota:nota||null});}
  return out;
}
function syncSheets(){
  const btn=document.getElementById('invSync');if(btn)btn.textContent='Conectando…';
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;
  fetch(url).then(r=>r.text()).then(txt=>{
    const list=parseSheet(txt);
    if(!list.length)throw new Error('vacío');
    const prev=REALES;
    REALES=list.map(r=>{const m=prev.find(p=>p.inmueble===r.inmueble&&p.barrio===r.barrio&&p.mapaN===r.mapaN&&p.loteNum!=null);return Object.assign(r,{key:newKey(),loteNum:m?m.loteNum:null});});
    saveInv();refreshAllStyles();renderFilters();openInventory();toast('Planilla actualizada: '+list.length+' inmuebles ✓');
  }).catch(()=>{ if(btn){btn.innerHTML=ic('sync')+' Sheets';} toast('No se pudo conectar a Sheets (CORS). Lo editado local quedó guardado.'); });
}

let routeLine=null;
function favIds(){return Object.keys(centers).filter(id=>uget(id).fav&&!info(id).isCasa);}
function updateRouteBadge(){const n=favIds().length,b=document.getElementById('routeBadge');b.style.display=n?'':'none';b.textContent=n;}
document.getElementById('btnRoute').onclick=()=>{
  if(routeLine){map.removeLayer(routeLine);routeLine=null;document.getElementById('btnRoute').classList.remove('on');return;}
  const ids=favIds();if(ids.length<2){toast('Marcá al menos 2 lotes como favoritos ❤');return;}
  // nearest-neighbor desde el primero
  let pts=ids.map(id=>({id,c:centers[id]}));const order=[pts.shift()];
  while(pts.length){let last=order[order.length-1].c,bi=0,bd=1e12;pts.forEach((p,i)=>{const d=haversine(last,p.c);if(d<bd){bd=d;bi=i;}});order.push(pts.splice(bi,1)[0]);}
  routeLine=L.polyline(order.map(o=>o.c),{color:'#b5532a',weight:4,dashArray:'2,9',lineCap:'round'}).addTo(map);
  let tot=0;for(let i=1;i<order.length;i++)tot+=haversine(order[i-1].c,order[i].c);
  document.getElementById('btnRoute').classList.add('on');map.fitBounds(routeLine.getBounds(),{padding:[60,60]});
  toast('Recorrido: '+order.length+' lotes · '+fmtDist(tot));
};
